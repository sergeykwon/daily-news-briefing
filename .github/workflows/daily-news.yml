name: Daily News Briefing

on:
  schedule:
    # 매일 오전 7시 30분 KST (= 22:30 UTC 전날)
    - cron: "30 22 * * *"
  workflow_dispatch:
    inputs:
      to_override:
        description: "수신자 이메일 (테스트용, 비우면 기본값 사용)"
        required: false
        default: ""

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test Resend API connectivity
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          echo "=== curl test ===" >> /tmp/briefing.log
          curl -sv -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"from":"onboarding@resend.dev","to":["sergeykwon@gmail.com"],"subject":"test","text":"test"}' \
            2>&1 | tail -30 >> /tmp/briefing.log || true

      - name: Run news briefing
        id: run
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ vars.FROM_EMAIL }}
          TO_OVERRIDE: ${{ github.event.inputs.to_override }}
        run: |
          set -o pipefail
          python -u news_briefing.py 2>&1 | tee -a /tmp/briefing.log

      - name: Commit log to repo
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          cp /tmp/briefing.log debug-latest.log 2>/dev/null || echo "(no log)" > debug-latest.log
          git add debug-latest.log
          git diff --cached --quiet || git commit -m "debug: log from run ${{ github.run_id }}"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:main
