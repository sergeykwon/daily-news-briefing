name: Daily News Briefing

on:
  schedule:
    # 매일 오전 7시 30분 KST (= 22:30 UTC 전날)
    - cron: "30 22 * * *"
  workflow_dispatch:
    inputs:
      to_override:
        description: "수신자 이메일 (테스트용, 비우면 기본값 사용)"
        required: false
        default: ""

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news briefing
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ vars.FROM_EMAIL }}
          TO_OVERRIDE: ${{ github.event.inputs.to_override }}
        run: |
          python -u news_briefing.py 2>&1 | tee /tmp/briefing.log
          echo "## Run Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/briefing.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # exit with original code
          exit ${PIPESTATUS[0]}
